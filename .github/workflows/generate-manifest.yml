name: Generate photo manifest

on:
  push:
    branches: [main]
    paths:
      - 'photos/**'

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install Pillow

      - name: Generate manifest
        run: python scripts/generate_manifest.py

      - name: Commit manifest if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add photos/manifest.json
          git diff --cached --quiet || git commit -m "chore: auto-update photo manifest [skip ci]"
          git push
