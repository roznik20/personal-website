<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photography — Nikita Rozanov</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script>document.documentElement.dataset.theme=localStorage.getItem('theme')||'light'</script>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/animations.css" />
  <style>
    /* ── PHOTO PAGE ─────────────────────────────────── */
    .photo-hero {
      padding: calc(var(--nav-h) + 4rem) var(--gutter) 3rem;
      border-bottom: 1px solid var(--rule);
    }

    .photo-hero-label {
      font-family: var(--mono);
      font-size: 0.68rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1rem;
    }

    .photo-hero h1 {
      font-size: clamp(2.5rem, 5vw, 4.5rem);
      margin-bottom: 1rem;
    }

    .photo-hero p {
      font-size: 1.05rem;
      color: var(--muted);
      max-width: 50ch;
      line-height: 1.8;
    }

    /* ── FILTER BAR ──────────────────────────────────── */
    .filter-bar {
      padding: 1.5rem var(--gutter);
      border-bottom: 1px solid var(--rule);
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }

    .filter-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-right: 0.5rem;
    }

    .filter-btn {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      padding: 0.3rem 0.8rem;
      border: 1px solid var(--rule);
      background: none;
      color: var(--muted);
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s, background 0.2s;
    }

    .filter-btn:hover,
    .filter-btn.active {
      border-color: var(--accent);
      color: var(--accent);
    }

    .filter-btn.active {
      background: var(--accent);
      color: var(--paper);
    }

    /* ── PHOTO GRID ──────────────────────────────────── */
    .photo-section {
      padding: 3rem var(--gutter);
    }

    .photo-category-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 1.5rem;
      padding-bottom: 0.5rem;
      border-bottom: 1px solid var(--rule);
    }

    .photo-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1rem;
      margin-bottom: 3rem;
    }

    .photo-card {
      position: relative;
      overflow: hidden;
      cursor: pointer;
      background: var(--surface);
      aspect-ratio: 4/3;
    }

    .photo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }

    .photo-card:hover img {
      transform: scale(1.03);
    }

    .photo-card-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(14,17,23,0.75) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
      display: flex;
      align-items: flex-end;
      padding: 1rem;
    }

    .photo-card:hover .photo-card-overlay {
      opacity: 1;
    }

    .photo-card-info {
      color: var(--paper);
    }

    .photo-card-title {
      font-size: 0.95rem;
      font-weight: 500;
      line-height: 1.3;
    }

    .photo-card-meta {
      font-family: var(--mono);
      font-size: 0.58rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.6);
      margin-top: 0.2rem;
    }

    /* ── EMPTY STATE ─────────────────────────────────── */
    .photo-empty {
      padding: 5rem var(--gutter);
      text-align: center;
      color: var(--muted);
      font-style: italic;
    }

    .photo-empty span {
      display: block;
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--red);
      margin-bottom: 0.75rem;
      font-style: normal;
    }

    /* ── LIGHTBOX ────────────────────────────────────── */
    #lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(14,17,23,0.95);
      z-index: 500;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      padding: 2rem;
    }

    #lightbox.open {
      display: flex;
    }

    #lightbox img {
      max-width: 100%;
      max-height: 80vh;
      object-fit: contain;
      display: block;
    }

    #lightbox-caption {
      margin-top: 1rem;
      text-align: center;
    }

    #lightbox-caption strong {
      display: block;
      color: var(--paper);
      font-size: 1rem;
    }

    #lightbox-caption span {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(245,240,232,0.45);
    }

    #lightbox-close {
      position: absolute;
      top: 1.5rem;
      right: 1.5rem;
      background: none;
      border: none;
      color: rgba(245,240,232,0.5);
      font-family: var(--mono);
      font-size: 0.7rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.2s;
    }

    #lightbox-close:hover { color: var(--paper); }

    #lightbox-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      width: 100%;
      display: flex;
      justify-content: space-between;
      padding: 0 1rem;
      pointer-events: none;
    }

    .lightbox-arrow {
      pointer-events: all;
      background: none;
      border: 1px solid rgba(245,240,232,0.2);
      color: rgba(245,240,232,0.5);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 0.5rem 0.8rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .lightbox-arrow:hover {
      border-color: var(--paper);
      color: var(--paper);
    }

    @media (max-width: 520px) {
      .photo-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- READING PROGRESS -->
  <div id="progress-bar"></div>

  <!-- NAV -->
  <nav id="navbar">
    <a href="index.html" class="nav-logo">N. Rozanov</a>
    <ul class="nav-links">
      <li><a href="index.html#about">About</a></li>
      <li><a href="index.html#education">Education</a></li>
      <li><a href="index.html#skills">Skills</a></li>
      <li><a href="index.html#projects">Projects</a></li>
      <li><a href="photography.html" class="active nav-external">Photography ↗</a></li>
      <li><a href="index.html#contact">Contact</a></li>
    </ul>
    <button class="theme-toggle" id="theme-toggle" aria-label="Toggle dark mode"></button>
    <button class="burger" id="burger" aria-label="Toggle menu">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- HERO -->
  <div class="photo-hero">
    <p class="photo-hero-label">Personal Work</p>
    <h1>Photography</h1>
    <p>A collection of photographs taken during travels, late nights under the stars, and quiet moments in between.</p>
  </div>

  <!-- FILTER BAR -->
  <div class="filter-bar" id="filter-bar">
    <span class="filter-label">Filter</span>
    <button class="filter-btn active" data-filter="all">All</button>
  </div>

  <!-- GALLERY -->
  <div id="gallery"></div>

  <!-- LIGHTBOX -->
  <div id="lightbox">
    <button id="lightbox-close">&#x2715; Close</button>
    <div id="lightbox-nav">
      <button class="lightbox-arrow" id="lb-prev">&#8592;</button>
      <button class="lightbox-arrow" id="lb-next">&#8594;</button>
    </div>
    <img id="lightbox-img" src="" alt="" />
    <div id="lightbox-caption">
      <strong id="lb-title"></strong>
      <span id="lb-meta"></span>
      <span id="lb-exif" style="display:block;margin-top:0.3rem;font-family:var(--mono);font-size:0.58rem;letter-spacing:0.08em;color:rgba(245,240,232,0.3);"></span>
    </div>
  </div>

  <footer>
    <span>Nikita Rozanov &middot; Photography</span>
    <span><a href="index.html" style="color:inherit;">&#8592; Back to main site</a></span>
  </footer>

  <script src="js/main.js"></script>
  <script>
    /*
     * HOW TO ADD PHOTOS:
     * 1. Drop your image files into the /photos/ folder
     * 2. Add an entry to /photos/manifest.json with:
     *    - "file":     filename (e.g. "aurora.jpg")
     *    - "title":    display title (optional)
     *    - "location": where it was taken (optional)
     *    - "date":     "YYYY-MM" format (optional, used for sorting)
     *    - "category": e.g. "astrophotography", "landscape", "travel" (optional)
     */

    let allPhotos = [];
    let filtered = [];
    let currentIndex = 0;

    async function loadGallery() {
      const res = await fetch('photos/manifest.json');
      const data = await res.json();

      // Filter out placeholder example entry if no actual file exists
      allPhotos = data.filter(p => p.file !== 'example.jpg');

      // Sort by date descending
      allPhotos.sort((a, b) => (b.date || '').localeCompare(a.date || ''));

      buildFilters();
      renderGallery('all');
    }

    function buildFilters() {
      const bar = document.getElementById('filter-bar');
      const categories = [...new Set(allPhotos.map(p => p.category).filter(Boolean))];
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'filter-btn';
        btn.dataset.filter = cat;
        btn.textContent = cat;
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          renderGallery(cat);
        });
        bar.appendChild(btn);
      });

      document.querySelector('[data-filter="all"]').addEventListener('click', () => {
        document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        document.querySelector('[data-filter="all"]').classList.add('active');
        renderGallery('all');
      });
    }

    function renderGallery(filter) {
      filtered = filter === 'all' ? allPhotos : allPhotos.filter(p => p.category === filter);
      const gallery = document.getElementById('gallery');
      gallery.innerHTML = '';

      if (filtered.length === 0) {
        gallery.innerHTML = `
          <div class="photo-empty">
            <span>No photos yet</span>
            Drop images into the /photos/ folder and update manifest.json :0
          </div>`;
        return;
      }

      // Group by category if showing all
      if (filter === 'all') {
        const groups = {};
        filtered.forEach(p => {
          const cat = p.category || 'uncategorised';
          if (!groups[cat]) groups[cat] = [];
          groups[cat].push(p);
        });

        Object.entries(groups).forEach(([cat, photos]) => {
          const section = document.createElement('div');
          section.className = 'photo-section';
          section.innerHTML = `<p class="photo-category-label">${cat}</p>`;
          const grid = buildGrid(photos);
          section.appendChild(grid);
          gallery.appendChild(section);
        });
      } else {
        const section = document.createElement('div');
        section.className = 'photo-section';
        const grid = buildGrid(filtered);
        section.appendChild(grid);
        gallery.appendChild(section);
      }
    }

    function buildGrid(photos) {
      const grid = document.createElement('div');
      grid.className = 'photo-grid';
      photos.forEach((photo, i) => {
        const idx = allPhotos.indexOf(photo);
        const card = document.createElement('div');
        card.className = 'photo-card';
        card.innerHTML = `
          <img src="photos/${photo.file}" alt="${photo.title || ''}" loading="lazy" />
          <div class="photo-card-overlay">
            <div class="photo-card-info">
              ${photo.title ? `<div class="photo-card-title">${photo.title}</div>` : ''}
              <div class="photo-card-meta">${[photo.location, photo.date].filter(Boolean).join(' &middot; ')}</div>
            </div>
          </div>`;
        card.addEventListener('click', () => openLightbox(idx));
        grid.appendChild(card);
      });
      return grid;
    }

    function openLightbox(index) {
      currentIndex = index;
      updateLightbox();
      document.getElementById('lightbox').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      document.getElementById('lightbox').classList.remove('open');
      document.body.style.overflow = '';
    }

    function updateLightbox() {
      const p = allPhotos[currentIndex];
      document.getElementById('lightbox-img').src = `photos/${p.file}`;
      document.getElementById('lightbox-img').alt = p.title || '';
      document.getElementById('lb-title').textContent = p.title || '';
      document.getElementById('lb-meta').textContent = [p.location, p.date].filter(Boolean).join(' · ');
      document.getElementById('lb-exif').textContent = [p.camera, p.exif].filter(Boolean).join(' — ');
    }

    document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
    document.getElementById('lightbox').addEventListener('click', e => {
      if (e.target === document.getElementById('lightbox')) closeLightbox();
    });
    document.getElementById('lb-prev').addEventListener('click', () => {
      currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length;
      updateLightbox();
    });
    document.getElementById('lb-next').addEventListener('click', () => {
      currentIndex = (currentIndex + 1) % allPhotos.length;
      updateLightbox();
    });
    document.addEventListener('keydown', e => {
      if (!document.getElementById('lightbox').classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') { currentIndex = (currentIndex - 1 + allPhotos.length) % allPhotos.length; updateLightbox(); }
      if (e.key === 'ArrowRight') { currentIndex = (currentIndex + 1) % allPhotos.length; updateLightbox(); }
    });

    loadGallery();
  </script>
</body>
</html>
